#
# Firmware metadata
#

# All of these can be overriden using environment variables of the same name.
#
#  Run 'fwup -m' to query values in a .fw file.
#  Use 'fw_printenv' to query values on the target.
#
# These are used by Nerves libraries to introspect.
define(NERVES_FW_PRODUCT, "Nerves Firmware for Seeed Studio Re*** Devices")
define(NERVES_FW_DESCRIPTION, "")
define(NERVES_FW_VERSION, "${NERVES_SDK_VERSION}")
define(NERVES_FW_PLATFORM, "rpi4")
define(NERVES_FW_ARCHITECTURE, "arm") # Not "aarch64" for historical reasons
define(NERVES_FW_AUTHOR, "Formrausch GmbH")

define(NERVES_FW_DEVPATH, "/dev/mmcblk0")
define(NERVES_FW_APPLICATION_PART0_DEVPATH, "/dev/mmcblk0p7") # Extended partition logical device
define(NERVES_FW_APPLICATION_PART0_FSTYPE, "f2fs")
define(NERVES_FW_APPLICATION_PART0_TARGET, "/root")
define(NERVES_PROVISIONING, "${NERVES_SYSTEM}/images/fwup_include/provisioning.conf")

# Default paths if not specified via the commandline
define(ROOTFS, "${NERVES_SYSTEM}/images/rootfs.squashfs")

# This configuration file will create an image that has an MBR and the
# following layout using RPi4 tryboot for automatic firmware rollback:
#
# +----------------------------+
# | MBR                        |
# +----------------------------+
# | Firmware configuration data|
# | (formatted as uboot env)   |
# +----------------------------+
# | p0: Autoboot (FAT32)       |
# | autoboot.txt, start4.elf   |
# +----------------------------+
# | p1: Boot A (FAT32)         |
# | kernel8.img, config.txt,   |
# | cmdline.txt, overlays, etc.|
# +----------------------------+
# | p2: Boot B (FAT32)         |
# +----------------------------+
# | p3: Extended partition      |
# |   p5: Rootfs A (squashfs)  |
# |   p6: Rootfs B (squashfs)  |
# |   p7: Application (f2fs)   |
# +----------------------------+
#
# The autoboot partition controls which boot partition the RPi4 bootloader
# loads via the tryboot mechanism. On upgrade, reboot_param("0 tryboot")
# tells the bootloader to try the new partition. If the firmware is not
# validated (via Nerves.Runtime.validate_firmware/0), the next reboot
# automatically falls back to the previous working partition.

# The Raspberry Pi is incredibly picky on the partition sizes and in ways that
# I don't understand. Test changes one at a time to make sure that they boot.
# (Sizes are in 512 byte blocks)
define(UBOOT_ENV_OFFSET, 16)
define(UBOOT_ENV_COUNT, 16)  # 8 KB

define(AUTOBOOT_PART_OFFSET, 63)
define(AUTOBOOT_PART_COUNT, 32749)
define-eval(BOOT_A_PART_OFFSET, "${AUTOBOOT_PART_OFFSET} + ${AUTOBOOT_PART_COUNT}")
define(BOOT_A_PART_COUNT, 38630)
define-eval(BOOT_B_PART_OFFSET, "${BOOT_A_PART_OFFSET} + ${BOOT_A_PART_COUNT}")
define(BOOT_B_PART_COUNT, ${BOOT_A_PART_COUNT})

# Extended partition starts after Boot B
define-eval(EXTENDED_PART_OFFSET, "${BOOT_B_PART_OFFSET} + ${BOOT_B_PART_COUNT}")

# Let the rootfs have room to grow up to 248 MiB. Aligned to nearest 1 MB boundary.
# Actual rootfs is ~126MB as of v1.5.0.
define(ROOTFS_A_PART_OFFSET, 110080)
define(ROOTFS_A_PART_COUNT, 507910)
define-eval(ROOTFS_B_PART_OFFSET, "${ROOTFS_A_PART_OFFSET} + ${ROOTFS_A_PART_COUNT}")
define(ROOTFS_B_PART_COUNT, ${ROOTFS_A_PART_COUNT})

# Application partition. This partition can occupy all of the remaining space.
# Size it to fit the destination.
# IMPORTANT: APP_PART_OFFSET must stay at 1125900 for OTA migration from v1.x
define-eval(APP_PART_OFFSET, "${ROOTFS_B_PART_OFFSET} + ${ROOTFS_B_PART_COUNT}")
define(APP_PART_COUNT, 1048576)

# Old partition offsets for OTA migration from v1.x (MBR-swap layout)
define(OLD_ROOTFS_A_PART_OFFSET, 77324)
define(OLD_ROOTFS_A_PART_COUNT, 524288)
define(OLD_ROOTFS_B_PART_OFFSET, 601612)
define(OLD_ROOTFS_B_PART_COUNT, 524288)

# Firmware archive metadata
meta-product = ${NERVES_FW_PRODUCT}
meta-description = ${NERVES_FW_DESCRIPTION}
meta-version = ${NERVES_FW_VERSION}
meta-platform = ${NERVES_FW_PLATFORM}
meta-architecture = ${NERVES_FW_ARCHITECTURE}
meta-author = ${NERVES_FW_AUTHOR}
meta-vcs-identifier = ${NERVES_FW_VCS_IDENTIFIER}
meta-misc = ${NERVES_FW_MISC}

# Single MBR for tryboot layout
# IMPORTANT: Partitions MUST be in disk order (offset ascending).
# Out-of-order entries break start4.elf MBR parsing (rpi-eeprom#705).
# Extended type MUST be 0x05, not 0xF (firmware#1887).
mbr mbr {
    partition 0 {
        block-offset = ${AUTOBOOT_PART_OFFSET}
        block-count = ${AUTOBOOT_PART_COUNT}
        type = 0xc # FAT32
        boot = true
    }
    partition 1 {
        block-offset = ${BOOT_A_PART_OFFSET}
        block-count = ${BOOT_A_PART_COUNT}
        type = 0xc # FAT32
        boot = true
    }
    partition 2 {
        block-offset = ${BOOT_B_PART_OFFSET}
        block-count = ${BOOT_B_PART_COUNT}
        type = 0xc # FAT32
        boot = true
    }
    partition 3 {
        block-offset = ${EXTENDED_PART_OFFSET}
        type = 0x05 # Extended
    }
    partition 4 {
        block-offset = ${ROOTFS_A_PART_OFFSET}
        block-count = ${ROOTFS_A_PART_COUNT}
        type = 0x83 # Linux
    }
    partition 5 {
        block-offset = ${ROOTFS_B_PART_OFFSET}
        block-count = ${ROOTFS_B_PART_COUNT}
        type = 0x83 # Linux
    }
    partition 6 {
        block-offset = ${APP_PART_OFFSET}
        block-count = ${APP_PART_COUNT}
        type = 0x83 # Linux
        expand = true
    }
}

# Location where installed firmware information is stored.
# While this is called "u-boot", u-boot isn't involved in this
# setup. It just provides a convenient key/value store format.
uboot-environment uboot-env {
    block-offset = ${UBOOT_ENV_OFFSET}
    block-count = ${UBOOT_ENV_COUNT}
}

# Autoboot files for tryboot mechanism.
# autoboot-a.txt: A is default boot, tryboot goes to B
# autoboot-b.txt: B is default boot, tryboot goes to A
file-resource autoboot-a.txt {
    contents = "\
[all]\n\
tryboot_a_b=1\n\
boot_partition=2\n\
[tryboot]\n\
boot_partition=3\n\
\n"
}
file-resource autoboot-b.txt {
    contents = "\
[all]\n\
tryboot_a_b=1\n\
boot_partition=3\n\
[tryboot]\n\
boot_partition=2\n\
\n"
}
